<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 433 500" width="433" height="500">
  <defs>

    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#060e1e"/>
    </linearGradient>

    <linearGradient id="haloFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>

    <linearGradient id="haloSheen" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.38)"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.00)"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="rgba(126,195,247,0.80)"/>
      <stop offset="45%"  stop-color="rgba(100,160,220,0.50)"/>
      <stop offset="100%" stop-color="rgba(80,130,200,0.70)"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Hex clip path — pointy-top orientation -->
    <clipPath id="hexClip">
      <polygon points="216.5,4 429,125 429,375 216.5,496 4,375 4,125"/>
    </clipPath>

  </defs>

  <!-- ── Hex background ── -->
  <polygon points="216.5,4 429,125 429,375 216.5,496 4,375 4,125"
           fill="url(#bg)" clip-path="url(#hexClip)"/>

  <!-- Subtle inner radial highlight at top -->
  <radialGradient id="toplight" cx="50%" cy="15%" r="55%">
    <stop offset="0%"   stop-color="rgba(180,220,255,0.07)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>
  <polygon points="216.5,4 429,125 429,375 216.5,496 4,375 4,125"
           fill="url(#toplight)" clip-path="url(#hexClip)"/>

  <!-- ── Tab bar ── -->
  <!-- Three tabs, horizontally centred -->

  <!-- Tab 1 inactive -->
  <rect x="82" y="132" width="68" height="32" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="116" y="153" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="600"
        fill="#6a9cc0" letter-spacing="0.03em">Tabs</text>

  <!-- Tab 2: ACTIVE — glass halo -->
  <rect x="156" y="128" width="80" height="40" rx="13"
        fill="none" stroke="rgba(126,195,247,0.22)" stroke-width="3.5"/>
  <rect x="158" y="130" width="76" height="36" rx="11"
        fill="url(#haloFill)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <rect x="158" y="130" width="76" height="36" rx="11"
        fill="url(#haloSheen)" opacity="0.7"/>
  <text x="196" y="154" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="800"
        fill="#ffffff" filter="url(#glow)" letter-spacing="0.03em">Glass</text>

  <!-- Tab 3 inactive -->
  <rect x="244" y="132" width="80" height="32" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="284" y="153" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="600"
        fill="#6a9cc0" letter-spacing="0.03em">Select</text>

  <!-- Transfer trace between tab 1 and 2 -->
  <ellipse cx="150" cy="148" rx="18" ry="5"
           fill="rgba(180,220,255,0.28)" filter="url(#glow)" opacity="0.75"/>

  <!-- ── Content card ── -->
  <rect x="82" y="184" width="270" height="100" rx="14"
        fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"
        filter="url(#cardShadow)"/>

  <!-- Dropdown trigger inside card -->
  <rect x="98" y="200" width="148" height="30" rx="9"
        fill="rgba(126,195,247,0.10)" stroke="rgba(126,195,247,0.30)" stroke-width="1"/>
  <text x="162" y="220" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600"
        fill="#7ec3f7" letter-spacing="0.02em">All categories</text>
  <!-- Chevron -->
  <polyline points="228,210 234,218 240,210" fill="none"
            stroke="#7ec3f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Filter tag pills -->
  <rect x="98" y="243" width="44" height="20" rx="10"
        fill="rgba(126,195,247,0.10)" stroke="rgba(126,195,247,0.22)" stroke-width="1"/>
  <text x="120" y="257" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif" font-size="9.5" font-weight="600"
        fill="#8ecfff">Alpha ×</text>

  <rect x="150" y="243" width="44" height="20" rx="10"
        fill="rgba(168,130,255,0.10)" stroke="rgba(168,130,255,0.22)" stroke-width="1"/>
  <text x="172" y="257" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif" font-size="9.5" font-weight="600"
        fill="#c4a8ff">Beta ×</text>

  <rect x="202" y="243" width="50" height="20" rx="10"
        fill="rgba(80,220,160,0.10)" stroke="rgba(80,220,160,0.22)" stroke-width="1"/>
  <text x="227" y="257" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif" font-size="9.5" font-weight="600"
        fill="#6ee2b0">Gamma ×</text>

  <!-- ── Wordmark ── -->
  <text x="216.5" y="335" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif"
        font-size="52" font-weight="900" letter-spacing="-0.04em"
        fill="#cfe6ff">glass</text>

  <text x="216.5" y="388" text-anchor="middle"
        font-family="Inter,-apple-system,sans-serif"
        font-size="52" font-weight="900" letter-spacing="-0.04em"
        fill="#7ec3f7" filter="url(#softglow)">tabs</text>

  <!-- ── Hex border ── -->
  <polygon points="216.5,4 429,125 429,375 216.5,496 4,375 4,125"
           fill="none" stroke="url(#borderGrad)" stroke-width="7"/>

</svg>
