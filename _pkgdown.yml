url: https://prigasg.github.io/glasstabs/

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: glasstabs — Animated Shiny Widgets
  description: |
    Animated glass-morphism tabs, single-select, and multi-select widgets for R Shiny.

navbar:
  bg: dark
  structure:
    left:
      - intro
      - articles
      - reference
    right:
      - search
      - github
  components:
    github:
      icon: fab fa-github
      href: https://github.com/prigasG/glasstabs

articles:
  - title: Cheatsheet
    navbar: Cheatsheet
    contents:
      - cheatsheet
  - title: Getting started
    navbar: ~
    contents:
      - getting-started
  - title: Widgets
    navbar: Widgets
    contents:
      - tabs
      - glassSelect
      - multiselect

reference:
  - title: Setup
    desc: Load CSS/JavaScript and launch built-in examples.
    contents:
      - useGlassTabs
      - runGlassExample

  - title: Tab widget — UI
    desc: |
      Animated glass-morphism tab navigation with a sliding halo, spring easing, and transfer trace.
    contents:
      - glassTabsUI
      - glassTabPanel
      - glassTabsOutput
      - glass_tab_theme

  - title: Tab widget — server
    desc: |
      Server-side helpers for reading, switching, showing/hiding, disabling, badging, and dynamically rendering tabs.
    contents:
      - glassTabsServer
      - renderGlassTabs
      - updateGlassTabsUI
      - updateGlassTabBadge
      - showGlassTab
      - disableGlassTab
      - appendGlassTab

  - title: Select widgets
    desc: |
      Animated single-select and multi-select dropdown widgets for Shiny, with theming, search, update helpers, and reactive value helpers.
    contents:
      - glassSelect
      - updateGlassSelect
      - glassSelectValue
      - glassMultiSelect
      - updateGlassMultiSelect
      - glassMultiSelectValue
      - glassFilterTags
      - glass_select_theme

footer:
  structure:
    left: developed_by
    right: built_with
