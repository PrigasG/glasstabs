name: download-stats

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-download-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::jsonlite

      - name: Update download tracker data
        run: Rscript tools/download-tracker/update-download-report.R

      - name: Upload download stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: download-stats
          path: tools/download-tracker/data/

      - name: Commit updated download stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/download-tracker/data/
          git diff --cached --quiet || git commit -m "Update download tracker data"
          git push
